TimelineNodes:
  - name: Ruthven
    id: RUT
    date: November 17, 2023
    icon: assets\img\timeline_icons\ruthven.JPG
    content:
      'While the death toll in Gaza increases daily, students urge the University to divest from weapons manufacturers. As President Santa 
      Ono ignores students’ requests to meet, peaceful protesters enter the administration building seeking an audience with him. They stage 
      a sit-in in his third floor office while more activists rally downstairs in rotunda. UMPD and nine other area police departments respond 
      in force, arresting 40 and issuing building and campus bans. Their actions result in at least 76 reports of violent police misconduct.<br><br>
      
      <strong>UMPD uses excessive force to throw student on floor and rip off her hijab.</strong>
      <iframe src="https://drive.google.com/file/d/1p6HkGKKd2iDhEDBQU_W-izmT1Uz3THwI/preview" width="100%" height="600vw" style="max-width:680px"></iframe><br>
      A student with a hijab was facing the exit of Ruthven, attempting to pass through crowd at entrance. Even though she was making meaningful 
      attempts to get through the crowd, the UMPD officer throws the student to the floor and rips off their hijab.'

  - name: Regents Meeting
    id: RM
    date: February 15, 2024
    icon: assets\img\timeline_icons\regents_meeting.jpg
    content:
      'Students rally outside a Board of Regents meeting, calling for divestment. University police raise barricades and push them into students, 
      shoving multiple people to the ground at the south parking area of the Ruthven Administration Building.<br><br>
      
      <strong>UMPD tramples students with metal barricade.</strong>
      <iframe src="https://drive.google.com/file/d/1GLLo7PHYCHJgOU8Xv7akarYvpXp45IIp/preview" width="100%" height="200vw" style="max-width:480px;"></iframe><br>
      Without issuing a dispersal notice or give students time to comply, UMPD Officers lift up a metal barricade and shove it in the face of 
      students caused them to fall over and be trampled.'
  
  - name: UMMA Protest
    id: UMMA
    date: May 3, 2024
    icon: assets\img\timeline_icons\umma.JPG
    content: 
      'Protestors chant and hold signs outside of the U-M Museum of Art (UMMA), where Regents attend an awards dinner. UMPD and MSP officers respond with escalating 
      violence, repeatedly slamming barricades into protesters and lifting bicycles and shoving them into people, knocking students over. UMPD Sergeant Ryan Cavanaugh 
      pepper sprays the crowd, and 4 protestors are detained, arrested, and given trespass warnings. Over a year later  in the summer of 2025, six students are disciplined 
      for the protest.<br><br>
      <strong>UMPD threatens and violates rights of legal observer</strong>
      <iframe src="https://drive.google.com/file/d/1R6g-Vq3j2KbzlOb428yCO4goClOiuwqv/preview" width="100%" height="200vw" style="max-width:480px;"></iframe><br>
      A legal observer is lawfully observing UMPD conduct with hands up. UMPD yells at the legal observer to back up and threatens to take the legal observe to jail. When 
      the legal observer asserts that it lawful for them to observe the cops, the cop says no it’s not. UMPD cops have no ideas what the law is or how to execute it.<br><br>
      <strong>UMPD shoves heavy bike at students’ heads</strong>
      <iframe src="https://drive.google.com/file/d/1KpepgppPMxbTX0ZdSNggw7yDHvQ0basA/preview" width="100%" height="600vw" style="max-width:680px"></iframe><br>
      A bicycle cop raises is bike and yells “move back.” Without giving the crowd any time to comply the cop immediately shoves the heavy bike at the faces and head of the 
      peaceful and unarmed crowd.'
    
  - name: Encampment Raid
    id: ER
    date: May 21, 2024
    icon: assets\img\timeline_icons\encampment_raid.jpg
    content: 
      'Officers in riot gear raid and destroy the Gaza Solidarity Encampment at 5:38am, pepper spraying campers, arresting four and sending four to the hospital with injuries 
      including a broken arm and concussions. They destroy everyone’s personal belongings. When a Muslim student goes to the police station to retrieve prayer mats and a 
      Quran, UMPD give them a campus ban.<br><br>
      <strong>UMPD pepper spray trapped students</strong>
      <iframe src="https://drive.google.com/file/d/1I_boL385zHIqJAdfD-hVhZOeXprV_5uv/preview" width="100%" height="600vw" style="max-width:680px"></iframe><br>
      UMPD officers in full riot gear back peaceful student protestors against a wall of tents without any pathways for students to leave. Then without proving any dispersal 
      notice, they spray a chemical agent directly into the faces of students.'
  
  - name: Festifall
    id: FF
    date: August 26, 2024
    icon: assets\img\timeline_icons\festifall.JPG
    content:
      'Protestors stage a “die-in” during Festifall, a welcome-back-to-school event. UMPD charge into the crowd and assault protesters, arresting four, one of whom is a minor. 
      Two protesters require medical treatment and one requires overnight hospitalization.<br><br>
      <strong>UMPD uses tackles people to arrest someone without explanation.</strong>
      <iframe src="https://drive.google.com/file/d/1L5g9XPbhdFp0_DG_k8L2EkiXwPgMLBoP/preview" width="100%" height="200vw" style="max-width:480px;"></iframe><br>
      A crowd of a dozen armed and dangerous UMPD officers confront people lawfully assembled in a public forum where other people are also gathered and standing. A senior 
      officer instructs two other officers to go after a black protestor, singling out that protestor without any explanation as to why. Note that the white senior officer 
      instructs black officers to target the black protester. UMPD cops charge at protesters using their full body and gear to tackle people. They arrest the singled-out 
      protestor without informing anyone the reason or probable cause for arrest.'
  
  - name: One Year of Genocide
    id: OYG
    date: October 7, 2024
    icon: assets\img\timeline_icons\one_year_of_genocide.JPG
    content:
      'U-M students stage a walkout to remember one year of genocide in Gaza. Deputy Chief Paul DeRidder lunges into the crowd and grabs a student using a megaphone. Three 
      other cops pull the student out of the crowd and arrest them for using a megaphone. The crowd protests this arbitrary and violent arrest; Deputy Chief Melissa Overton 
      pepper sprays protesters and orders officers to do the same. Over 70 people are affected and 29 reports of violent police misconduct are later submitted in an incident 
      response form.<br><br>
      <strong>UMPD discriminately and violently arrests without explanation</strong>
      <iframe src="https://drive.google.com/file/d/1pAkajxsWvYvyXaG1p34n-lje1w19jWLz/preview" width="100%" height="200vw" style="max-width:480px;"></iframe>
      An armed and dangerous UMPD cop targets a student walking in front of the cop. Two cops chase down the student and violently pull at the student’s arms to arrest the 
      student. The cops never explain why they are detaining the student. The student is acting lawfully.'