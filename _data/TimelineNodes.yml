TimelineNodes:
  - name: Ruthven
    id: RUT
    date: November 17, 2023
    icon: assets\img\timeline_icons\ruthven.JPG
    content:
      'While the death toll in Gaza increases daily, students urge the University to divest from weapons manufacturers. As President Santa 
      Ono ignores students’ requests to meet, peaceful protesters enter the administration building seeking an audience with him. They stage 
      a sit-in in his third floor office while more activists rally downstairs in rotunda. UMPD and nine other area police departments respond 
      in force, arresting 40 and issuing building and campus bans. Their actions result in at least 76 reports of violent police misconduct.<br><br>
      
      <strong>UMPD uses excessive force to throw student on floor and rip off her hijab.</strong><br>
      <iframe src="https://drive.google.com/file/d/1p6HkGKKd2iDhEDBQU_W-izmT1Uz3THwI/preview" width="100%" height="600vw" style="max-width:680px"></iframe><br>
      A student with a hijab was facing the exit of Ruthven, attempting to pass through crowd at entrance. Even though she was making meaningful 
      attempts to get through the crowd, the UMPD officer throws the student to the floor and rips off their hijab.'